<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Birthday Wishes ✨</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  overflow: hidden;
  background: radial-gradient(circle at bottom, #172554, #020617 70%);
  color: white;
  font-family: "Poppins", Arial, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Stars background */
.stars,
.stars:before,
.stars:after {
  position: absolute;
  width: 3px;
  height: 3px;
  background: white;
  border-radius: 50%;
  content: "";
}

.stars {
  top: 20%;
  left: 10%;
  animation: twinkle 2s infinite alternate;
  box-shadow:
    50px 20px white,
    120px -30px white,
    200px 60px #fff,
    300px -50px white,
    420px 80px white,
    550px -20px white,
    700px 40px white,
    850px -60px white,
    950px 100px white,
    1100px -20px white,
    150px 200px white,
    400px 250px white,
    650px 180px white,
    900px 220px white;
}

.stars:before {
  top: 100px;
  left: 200px;
  box-shadow:
    80px 30px white,
    220px -20px white,
    350px 70px white,
    500px 20px white,
    750px 100px white;
}

@keyframes twinkle {
  from { opacity: .3; }
  to { opacity: 1; }
}

/* Moon */
.moon {
  position: absolute;
  top: 80px;
  right: 120px;
  width: 130px;
  height: 130px;
  background: #fff7cc;
  border-radius: 50%;
  box-shadow: 0 0 40px #fff7cc;
}

.moon::after {
  content: "";
  position: absolute;
  width: 130px;
  height: 130px;
  background: #020617;
  border-radius: 50%;
  left: 35px;
  top: -10px;
}

/* Card */
.card {
  position: relative;
  z-index: 2;
  width: 90%;
  max-width: 600px;
  padding: 45px 30px;
  text-align: center;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,.2);
  backdrop-filter: blur(12px);
  border-radius: 25px;
  box-shadow: 0 0 40px rgba(255,255,255,.15);
  animation: appear 1.5s ease;
}

@keyframes appear {
  from {
    opacity: 0;
    transform: translateY(50px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

h1 {
  font-size: clamp(2rem, 5vw, 3.5rem);
  color: #f9a8d4;
  text-shadow: 0 0 20px #ec4899;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #ec4899; }
  to { text-shadow: 0 0 30px #f472b6; }
}

p {
  margin: 20px 0;
  font-size: clamp(1rem, 3vw, 1.3rem);
  line-height: 1.7;
  color: #e2e8f0;
}

.name {
  color: #fde68a;
  font-weight: bold;
}

/* Button */
button {
  margin-top: 15px;
  padding: 14px 30px;
  border: none;
  border-radius: 30px;
  background: linear-gradient(45deg,#ec4899,#8b5cf6);
  color: white;
  font-size: 1rem;
  cursor: pointer;
  transition: .3s;
}

button:hover {
  transform: scale(1.08);
  box-shadow: 0 0 25px #ec4899;
}

/* Floating hearts */
.heart {
  position: absolute;
  bottom: -20px;
  color: #fb7185;
  font-size: 25px;
  animation: float 8s linear infinite;
}

@keyframes float {
  0% {
    transform: translateY(0) rotate(0);
    opacity: 0;
  }
  20% {
    opacity: 1;
  }
  100% {
    transform: translateY(-110vh) rotate(360deg);
    opacity: 0;
  }
}

.heart:nth-child(1){left:10%;animation-delay:1s}
.heart:nth-child(2){left:30%;animation-delay:3s}
.heart:nth-child(3){left:60%;animation-delay:5s}
.heart:nth-child(4){left:80%;animation-delay:2s}

@media(max-width:600px){
  .moon {
    width:90px;
    height:90px;
    right:40px;
    top:40px;
  }

  .moon::after {
    width:90px;
    height:90px;
    left:25px;
  }

  .card {
    padding:35px 20px;
  }
}
</style>
</head>

<body>

<div class="stars"></div>
<div class="moon"></div>

<div class="heart">♥</div>
<div class="heart">♥</div>
<div class="heart">♥</div>
<div class="heart">♥</div>

<div class="card">
  <h1>🎂 Happy Birthday!</h1>

  <p>
    Wishing you a night full of magic, stars, and endless happiness.
    May your dreams shine brighter than the moon and your year be filled
    with love, success, and beautiful memories.
  </p>

  <p class="name">
    ✨ For Someone Special ✨
  </p>

  <button onclick="celebrate()">
    Make a Wish 🌙
  </button>
</div>

<script>
function celebrate(){
  alert("✨ Your birthday wish has been sent to the stars! 🌙🎂");
}
</script>

</body>
</html>
